<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 4 Restaurant</title>
    <link rel="stylesheet" href="../First Page BG/fpbg.css">
</head>

<body>
    <a href="fpbg.htm"></a>

    <div class="form-container">
        <h2>Join Group 4 Restaurant</h2>
        <p>Create an account for Reservation!</p>
        
        <form action="#" method="POST">
            
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>
            
            <div class="input-group">
                <label for="contact">Contact Number</label>
                <input type="text" id="contact" name="contact" placeholder="e.g., +265999999999" required>
            </div>
            
            <button type="submit" class="submit-btn">Register Now</button>

        </form>
    </div>
       

    <script src="script.js"></script>
</body>
